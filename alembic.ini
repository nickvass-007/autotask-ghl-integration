# Alembic configuration. The database URL is NOT stored here — it is injected at
# runtime from Settings (DATABASE_URL) in migrations/env.py, so the same migrations
# run against local Postgres and Azure SQL (Spec §3.4) and no secret lives in this file.

[alembic]
script_location = migrations
prepend_sys_path = src
# Use a timezone-aware, sortable revision filename prefix.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
